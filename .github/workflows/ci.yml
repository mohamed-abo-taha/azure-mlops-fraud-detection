name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff
      - name: Lint
        run: ruff check src tests scripts || true
      - name: Unit tests
        run: pytest -q
      - name: Smoke train (synthetic, fast)
        run: python -m src.train --no-openml --version ci-${{ github.run_number }}
